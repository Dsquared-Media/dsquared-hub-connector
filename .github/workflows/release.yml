name: Build + attach plugin zip on release

# Fires when a tag is pushed. Builds dsquared-hub-connector.zip with the
# correct folder structure (root = dsquared-hub-connector/) and attaches
# it to the GitHub release. Without this, users who download "Source
# code (zip)" get an archive that extracts to a sha-suffixed folder,
# breaking WordPress's plugin path and auto-deactivating the plugin on
# every update.

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-attach:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage plugin files under dsquared-hub-connector/
        run: |
          mkdir -p build/dsquared-hub-connector
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='build' \
            --exclude='*.zip' \
            --exclude='.DS_Store' \
            --exclude='node_modules' \
            --exclude='tests' \
            ./ build/dsquared-hub-connector/

      - name: Create zip
        working-directory: build
        run: zip -rq dsquared-hub-connector.zip dsquared-hub-connector

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "name=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload as release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          # If a release already exists for this tag, upload (clobbering any
          # prior asset of the same name). Otherwise create a draft release
          # against the tag and upload.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" build/dsquared-hub-connector.zip --clobber
          else
            gh release create "$TAG" build/dsquared-hub-connector.zip \
              --title "$TAG" \
              --notes "Automated plugin zip build. See CHANGELOG.md for details."
          fi
